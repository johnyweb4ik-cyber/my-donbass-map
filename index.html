<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта СВО — Донбасс</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <!-- Сначала подключаем config.js с ключом -->
    <script src="config.js"></script>
    <!-- Затем подключаем API, используя переменную из config.js -->
    <script>
        // Создаём динамический скрипт для загрузки API с ключом из config.js
        var script = document.createElement('script');
        script.src = 'https://api-maps.yandex.ru/2.0-stable/?apikey=' + YANDEX_MAPS_API_KEY + '&load=package.standard&lang=ru-RU';
        document.head.appendChild(script);
    </script>
    <script type="text/javascript">
        // Ждём загрузки API
        ymaps.ready(init);

        function init() {
            var myMap = new ymaps.Map("map", {
                center: [48.5, 38.0],
                zoom: 8,
                controls: ["zoomControl", "fullscreenControl"]
            });
        }
    </script>
</head>
<body>
    <div id="map"></div>
</body>
</html>
