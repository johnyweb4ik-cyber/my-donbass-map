<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта СВО — Донбасс</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <script src="https://api-maps.yandex.ru/2.0-stable/?apikey=86684933-bc3e-42eb-afcb-98d932c74d44&load=package.standard&lang=ru-RU" type="text/javascript"></script>
    <script type="text/javascript">
        ymaps.ready(init);

        function init() {
            var myMap = new ymaps.Map("map", {
                center: [48.5, 38.0],
                zoom: 8,
                controls: ["zoomControl", "fullscreenControl", "typeSelector"]
            });
            
            // Принудительно показываем кнопки масштаба в правом углу
            myMap.controls.get("zoomControl").options.set({ position: { right: 10, top: 100 } });
        }
    </script>
</head>
<body>
    <div id="map"></div>
</body>
</html>
