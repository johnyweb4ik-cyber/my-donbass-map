<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта СВО — Донбасс</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <!-- ПОДКЛЮЧАЕМ API 3.0 (обратите внимание на /v3/ в ссылке) -->
    <script src="https://api-maps.yandex.ru/v3/?apikey=86684933-bc3e-42eb-afcb-98d932c74d44&lang=ru_RU"></script>
    <script>
        async function initMap() {
            // Ждём загрузки API
            await ymaps3.ready;
            
            // Создаём карту
            const map = new ymaps3.YMap(
                document.getElementById('map'),
                {
                    location: {
                        center: [38.0, 48.5],  // [долгота, широта] для Донбасса
                        zoom: 8
                    }
                }
            );
            
            // Добавляем слой с картой (схема, спутник и т.д.)
            map.addChild(new ymaps3.YMapDefaultSchemeLayer());
        }
        
        initMap();
    </script>
</head>
<body>
    <div id="map"></div>
</body>
</html>
