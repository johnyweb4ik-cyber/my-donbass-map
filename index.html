<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта СВО — Донбасс</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <!-- Подключаем API 3.0 с вашим ключом -->
    <script src="https://api-maps.yandex.ru/3.0/?apikey=86684933-bc3e-42eb-afcb-98d932c74d44&lang=ru_RU"></script>
    <script>
        // Функция инициализации для API 3.0
        async function initMap() {
            await ymaps3.ready;
            
            // Создаём карту
            const map = new ymaps3.Map('map', {
                location: {
                    center: [38.0, 48.5],  // [долгота, широта] — внимание, порядок changed!
                    zoom: 8
                },
                controls: ['zoomControl', 'fullscreenControl']
            });
        }
        
        initMap();
    </script>
</head>
<body>
    <div id="map"></div>
</body>
</html>
