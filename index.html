<!DOCTYPE html>
<html>
  <head>
    <title>Карта СВО — Донбасс</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <script src="https://api-maps.yandex.ru/v3/?apikey=86684933-bc3e-42eb-afcb-98d932c74d44&lang=ru_RU"></script>
    <script>
        // ВАЖНО: функция вызывается ДО своего объявления (hoisting)
        initMap();

        async function initMap() {
            await ymaps3.ready;

            const {YMap, YMapDefaultSchemeLayer} = ymaps3;

            const map = new YMap(
                document.getElementById('map'),
                {
                    location: {
                        center: [38.0, 48.5],  // долгота, широта (Донбасс)
                        zoom: 8
                    }
                }
            );

            map.addChild(new YMapDefaultSchemeLayer());
        }
    </script>
  </head>

  <body>
    <div id="map"></div>
  </body>
</html>
